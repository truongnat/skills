name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Validate skills
        run: python scripts/validate_skills.py

      - name: Validate office skills
        run: python scripts/validate_office_skills.py

      - name: Resolve default install profile
        run: python scripts/resolve_install_profile.py --source . --check

      - name: Pytest
        run: pytest -q

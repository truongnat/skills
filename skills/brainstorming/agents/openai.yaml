display_name: "Brainstorming"
short_description: "Step workflow: seed DISCUSSION template, then frame → scope/options → recommend → self-check before design/planning."
default_prompt: "Use $brainstorming: seed the template, triage issues and visual needs, stop to ask about unresolved Critical/blocking items, then scope/options/recommend/self-check."
required_input: "Initial request, repo context, existing documents, constraints, current behavior, desired outcome, stakeholder feedback if available; session path."
required_output: "Session DISCUSSION.md seeded from templates/DISCUSSION.template.md and filled via steps/. Incomplete if chat-only or steps skipped."
note_important: "Do NOT skip step-01-init. Stop and ask focused questions when a Critical issue or blocking unknown is unresolved; never continue by choosing defaults. Classify visual need as text/table/diagram/html-recommended/none. Create self-contained accessible HTML only after user confirmation unless explicitly requested. Do NOT treat assumptions as facts, hide blockers, implement code, or create PLAN/TASKS."
workflow:
  - "Seed DISCUSSION.md from the template."
  - "Frame facts/assumptions/unknowns; classify material issues by severity, clarity, blocking status, owner, and visual need."
  - "STOP and ask at most three focused blocking questions when Critical/blocking items remain; record answers before continuing."
  - "Choose text/table/diagram/HTML by decision value; HTML only for spatial/state comparison and with user confirmation."
  - "Fill scope/options, recommendation/handoff, then run self-check."
artifacts:
  DISCUSSION.md:
    required: true
    schema:
      source_template:
        type: string
        required: true
        description: "Must be seeded from templates/DISCUSSION.template.md via step-01."
      executive_summary:
        type: array
        required: true
        description: "Maximum five bullets with direction, key facts/unknowns, recommendation, risk, and next action."
      developer_overview:
        type: object
        required: true
        description: "Status, open Critical/blocking count, visual decisions pending, next action."
      charts:
        type: array
        required: false
        description: "Mermaid charts for options/flows/risks when useful; otherwise N/A with reason."
      context_5w1h:
        type: object
        required: false
        description: "What, Why, Who, When, Where, How when useful; use Unknown/N/A explicitly."
      goal:
        type: string
        required: true
        description: "One sentence describing the goal."
      desired_outcome:
        type: string
        required: true
        description: "What success looks like."
      confirmed_facts:
        type: array
        required: true
        description: "Known facts from user, repo, or research."
      constraints:
        type: array
        required: false
        description: "Time, platform, tech stack, budget, tool limits."
      assumptions:
        type: array
        required: false
        description: "Assumptions with risk level and confirmation status."
      unknowns:
        type: array
        required: false
        description: "Open questions with blocking flag."
      issue_triage:
        type: array
        required: true
        description: "Issue ID, decision, severity, clarity, blocking, owner, status."
      clarification_checkpoint:
        type: array
        required: true
        description: "Issue ID, focused question, why it blocks, user answer/evidence, resolved status."
      visual_triage:
        type: array
        required: true
        description: "Issue ID, visual need, format, reason, user confirmation, artifact/status."
      scope_in:
        type: array
        required: true
        description: "What is in scope."
      scope_out:
        type: array
        required: true
        description: "What is out of scope."
      non_goals:
        type: array
        required: false
        description: "Goals explicitly not pursued."
      options_considered:
        type: table
        required: true
        description: "Option, pros, cons, effort, risk, reversibility, verify method."
      recommendation:
        type: string
        required: true
        description: "Recommended option with reason and confidence."
      risks:
        type: array
        required: false
        description: "Risks with impact and mitigation."
      handoff:
        type: string
        required: true
        description: "Next skill: business-analysis, basic-design, planning, research, or execution."
  OVERVIEW.md:
    required: true
    description: "Session developer landing page with status, progress chart, open decisions, next action."
  VISUAL_DECISION.html:
    required: false
    description: "User-confirmed self-contained accessible decision aid for html-recommended issues; serve via session-serve and retrieve logged choices via choice-reader; no external network/sensitive data (local decision client only)."

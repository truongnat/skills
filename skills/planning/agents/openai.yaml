display_name: "Planning"
short_description: "Step workflow: seed PLAN/TASKS templates, fill PLAN slim then TASKS micro-tasks, self-check. Implement before tests."
default_prompt: "Use $planning: follow steps/step-01-init.md then step-02..04. Copy templates first; never PLAN-only or tasks-inside-PLAN."
required_input: "DETAIL_DESIGN.md when present; else BASIC_DESIGN.md / DISCUSSION.md / BA notes; user request; codebase mapping; session path; constraints."
required_output: "Session PLAN.md + TASKS.md seeded from templates/ then filled via steps/. Incomplete if steps skipped, PLAN-only, or task bodies inside PLAN.md."
note_important: "Do NOT skip steps/step-01-init.md. Do NOT invent PLAN/TASKS without copying templates first. Do NOT fill TASKS before PLAN step completes. Do NOT put ### T-00x AC/Verify/Files in PLAN.md. Do NOT make first tasks a test-case matrix before feature code. Do NOT emit epic cards (step-03 size). Do NOT set Ready=Yes while blockers remain. Do NOT implement code. Do NOT finish without both files on disk and step-04 self-check."
artifacts:
  PLAN.md:
    required: true
    schema:
      source_template:
        type: string
        required: true
        description: "Must be seeded from templates/PLAN.template.md via step-01."
      goal:
        type: string
        required: true
        description: "One sentence."
      scope:
        type: string
        required: true
        description: "In scope summary."
      non_goals:
        type: array
        required: false
        description: "Excluded outcomes."
      assumptions:
        type: array
        required: true
        description: "Assumptions with risk and confirmation."
      approach:
        type: string
        required: true
        description: "Phased strategy only. No per-task AC/Verify/Files."
      affected_areas:
        type: array
        required: false
        description: "High-level areas with confidence."
      test_strategy:
        type: string
        required: false
        description: "After-code verification approach."
      verification_strategy:
        type: string
        required: true
        description: "Automated and manual verification."
      definition_of_done:
        type: array
        required: true
        description: "Falsifiable checklist."
      rollback_strategy:
        type: string
        required: true
        description: "Undo per code/config/data."
      risks:
        type: array
        required: false
        description: "Risks with impact and mitigation."
      task_index:
        type: array
        required: true
        description: "ID + short title only; implement before tests."
      handoff:
        type: string
        required: true
        description: "Ready only after step-04 pass; else blockers."
  TASKS.md:
    required: true
    schema:
      source_template:
        type: string
        required: true
        description: "Must be seeded from templates/TASKS.template.md via step-01."
      plan_ref:
        type: string
        required: true
        description: "PLAN.md in same session folder."
      tasks:
        type: array
        required: true
        description: "Micro-task cards with Trace, AC, Verify, Files/scope, confidence, status."
      execution_order:
        type: array
        required: true
        description: "Ordered IDs matching PLAN task_index. Implement before tests."
      notes:
        type: array
        required: false
        description: "Sequencing notes or blockers."

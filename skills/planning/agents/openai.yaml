display_name: "Planning"
short_description: "Step workflow: seed PLAN/TASKS, inventory→specific micro-tasks, self-check. Implement before tests."
default_prompt: "Use $planning: follow steps/step-01-init.md then step-02..04. Copy templates first; build Work inventory before cards; never vague epics or PLAN-only."
required_input: "DETAIL_DESIGN.md when present; else BASIC_DESIGN.md / DISCUSSION.md / BA notes; user request; codebase mapping; session path; constraints."
required_output: "Session PLAN.md + TASKS.md with Work inventory and specific cards. Incomplete if steps skipped, PLAN-only, empty template, or vague layer/epic tasks."
note_important: "Do NOT skip step-01. Do NOT fill TASKS before PLAN. Do NOT skip Work inventory. Do NOT emit vague layer titles or multi-endpoint/multi-screen cards. Each card needs Trace§ + Work items≥2 + concrete Files/scope + observable AC + Flow/comment notes (or N/A with reason). Do NOT set Ready=Yes while blockers remain. Do NOT implement code."
artifacts:
  PLAN.md:
    required: true
    schema:
      source_template:
        type: string
        required: true
        description: "Must be seeded from templates/PLAN.template.md via step-01."
      executive_summary:
        type: array
        required: true
        description: "Maximum five bullets with goal, approach, key risk, readiness, and next action."
      context_5w1h:
        type: object
        required: false
        description: "What, Why, Who, When, Where, How when useful; use Unknown/N/A explicitly."
      goal:
        type: string
        required: true
        description: "One sentence."
      scope:
        type: string
        required: true
        description: "In scope summary."
      non_goals:
        type: array
        required: false
        description: "Excluded outcomes."
      assumptions:
        type: array
        required: true
        description: "Assumptions with risk and confirmation."
      approach:
        type: string
        required: true
        description: "Phased strategy only. No per-task AC/Verify/Files."
      affected_areas:
        type: array
        required: false
        description: "High-level areas with confidence."
      test_strategy:
        type: string
        required: false
        description: "After-code verification approach."
      verification_strategy:
        type: string
        required: true
        description: "Automated and manual verification."
      definition_of_done:
        type: array
        required: true
        description: "Falsifiable checklist."
      rollback_strategy:
        type: string
        required: true
        description: "Undo per code/config/data."
      risks:
        type: array
        required: false
        description: "Risks with impact and mitigation."
      task_index:
        type: array
        required: true
        description: "ID + short title only; implement before tests."
      handoff:
        type: string
        required: true
        description: "Ready only after step-04 pass; else blockers."
  TASKS.md:
    required: true
    schema:
      source_template:
        type: string
        required: true
        description: "Must be seeded from templates/TASKS.template.md via step-01."
      work_inventory:
        type: array
        required: true
        description: "Full Mode: one row per implementable unit from design (before cards)."
      plan_ref:
        type: string
        required: true
        description: "PLAN.md in same session folder."
      tasks:
        type: array
        required: true
        description: "Micro-task cards: Trace§, Status=todo, Work items≥2, observable AC, Flow/comment notes (or N/A), concrete Files/scope, confidence. No vague layer epithets."
      progress_board:
        type: array
        required: true
        description: "One row per card: Done checkbox, ID, Title, Status (seeded todo)."
      execution_order:
        type: array
        required: true
        description: "Ordered IDs matching PLAN task_index. Implement before tests."
      notes:
        type: array
        required: false
        description: "Sequencing notes or blockers."

display_name: "Planning"
short_description: "Build PLAN.md (strategy, DoD, rollback) and TASKS.md (detailed executable tasks) from design/discussion artifacts or clear requests."
default_prompt: "Use $planning to produce PLAN.md (strategy) and TASKS.md (detailed task cards) from DETAIL_DESIGN.md when present."
required_input: "DETAIL_DESIGN.md when present; else BASIC_DESIGN.md / DISCUSSION.md / requirement notes; user request; codebase mapping; affected systems; constraints."
required_output: "PLAN.md with goal, scope, approach, verification strategy, DoD, rollback, task_index; TASKS.md with detailed task cards, dependencies, AC, verification, execution_order."
note_important: "Do NOT implement code during planning. Do NOT dump full task cards into PLAN.md — those belong in TASKS.md. Do NOT invent affected files without inspecting the codebase. Do NOT treat assumptions as confirmed. Do NOT skip rollback for destructive changes. Do NOT re-design architecture when design artifacts already exist."
artifacts:
  PLAN.md:
    required: true
    schema:
      goal:
        type: string
        required: true
        description: "One sentence."
      scope:
        type: string
        required: true
        description: "In scope summary."
      non_goals:
        type: array
        required: false
        description: "Explicitly excluded outcomes."
      assumptions:
        type: array
        required: true
        description: "Assumptions with risk and confirmation status."
      approach:
        type: string
        required: true
        description: "Phased strategy (how work will proceed). Not step-by-step file edits."
      affected_areas:
        type: array
        required: false
        description: "Systems/dirs to touch with confidence (known / inferred / unknown). High level only."
      test_strategy:
        type: string
        required: false
        description: "Optional coverage summary (dimensions, frameworks in project, estimated depth)."
      verification_strategy:
        type: string
        required: true
        description: "Automated and manual verification approach for the whole change."
      definition_of_done:
        type: array
        required: true
        description: "Checklist of verifiable completion conditions."
      rollback_strategy:
        type: string
        required: true
        description: "How to undo changes per type (code/config/data)."
      risks:
        type: array
        required: false
        description: "Risks with impact and mitigation."
      task_index:
        type: array
        required: true
        description: "Ordered task IDs summarizing TASKS.md (e.g. T-001 Write tests, T-002 Implement API)."
      handoff:
        type: string
        required: true
        description: "Ready for sync/execution? Blocking items? Review required?"
  TASKS.md:
    required: true
    schema:
      plan_ref:
        type: string
        required: true
        description: "Reference to PLAN.md."
      tasks:
        type: array
        required: true
        description: "Task cards: ID, title, description, dependencies, acceptance_criteria, verification, files_or_scope, confidence, status (todo/in_progress/done)."
      execution_order:
        type: array
        required: true
        description: "Ordered list of task IDs."
      notes:
        type: array
        required: false
        description: "Sequencing notes, blockers, or split-file references."
